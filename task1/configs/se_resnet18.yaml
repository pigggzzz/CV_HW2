# Experiment E3: SE-ResNet18 with Squeeze-and-Excitation blocks
experiment:
  name: "E3_se_resnet18"
  description: "ResNet-18 with SE blocks - attention comparison"
  output_dir: "outputs"
  seed: 42

model:
  arch: "se_resnet18"
  pretrained: true
  num_classes: 37
  attention: "se"
  se_reduction: 16           # SE block reduction ratio

data:
  dataset: "oxford_pets"
  data_root: "data/oxford_pets"
  image_size: 224
  batch_size: 64
  num_workers: 4
  val_split: 0.2
  pin_memory: true

# Use best hyperparameters found in Step 2
training:
  epochs: 30
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 1.0e-4
  backbone_lr: 1.0e-4
  head_lr: 1.0e-2
  scheduler: "cosine"
  step_size: 10
  gamma: 0.1
  warmup_epochs: 0
  mixed_precision: true
  gradient_clip: null

logging:
  use_wandb: true
  use_swanlab: false
  project: "pet-classification"
  log_interval: 10
