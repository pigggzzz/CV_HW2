# Experiment E4: CBAM-ResNet18 with Convolutional Block Attention Module
experiment:
  name: "E4_cbam_resnet18"
  description: "ResNet-18 with CBAM blocks - attention comparison"
  output_dir: "outputs"
  seed: 42

model:
  arch: "cbam_resnet18"
  pretrained: true
  num_classes: 37
  attention: "cbam"
  cbam_reduction: 16         # CBAM channel attention reduction ratio
  cbam_kernel_size: 7        # CBAM spatial attention kernel size

data:
  dataset: "oxford_pets"
  data_root: "data/oxford_pets"
  image_size: 224
  batch_size: 64
  num_workers: 4
  val_split: 0.2
  pin_memory: true

# Use best hyperparameters found in Step 2
training:
  epochs: 30
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 1.0e-4
  backbone_lr: 1.0e-4
  head_lr: 1.0e-2
  scheduler: "cosine"
  step_size: 10
  gamma: 0.1
  warmup_epochs: 0
  mixed_precision: true
  gradient_clip: null

logging:
  use_wandb: true
  use_swanlab: false
  project: "pet-classification"
  log_interval: 10
