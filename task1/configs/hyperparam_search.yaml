# Hyperparameter search configuration
# Defines the grid of experiments to run
experiment:
  name: "hyperparam_search"
  description: "Grid search over learning rates and epochs"
  output_dir: "outputs"
  seed: 42

model:
  arch: "resnet18"
  pretrained: true
  num_classes: 37
  attention: null

data:
  dataset: "oxford_pets"
  data_root: "data/oxford_pets"
  image_size: 224
  batch_size: 64
  num_workers: 4
  val_split: 0.2
  pin_memory: true

# Grid search parameters
# Each combination produces one experiment run
sweep:
  backbone_lr: [1.0e-5, 1.0e-4]
  head_lr: [1.0e-3, 1.0e-2]
  epochs: [20, 30]

# Default training settings (overridden by sweep)
training:
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 1.0e-4
  backbone_lr: 1.0e-4       # default, overridden by sweep
  head_lr: 1.0e-3            # default, overridden by sweep
  epochs: 30                 # default, overridden by sweep
  scheduler: "cosine"
  step_size: 10
  gamma: 0.1
  warmup_epochs: 0
  mixed_precision: true
  gradient_clip: null

logging:
  use_wandb: true
  use_swanlab: false
  project: "pet-classification"
  log_interval: 10
