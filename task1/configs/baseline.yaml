# Experiment E1: ResNet-18 Baseline with ImageNet pretrained weights
experiment:
  name: "E1_baseline"
  description: "ResNet-18 fine-tuning with ImageNet pretrained weights"
  output_dir: "outputs"
  seed: 42

model:
  arch: "resnet18"
  pretrained: true
  num_classes: 37
  attention: null  # none | se | cbam

data:
  dataset: "oxford_pets"
  data_root: "data/oxford_pets"
  image_size: 224
  batch_size: 64
  num_workers: 4
  val_split: 0.2
  pin_memory: true

training:
  epochs: 30
  optimizer: "sgd"           # sgd | adamw
  momentum: 0.9
  weight_decay: 1.0e-4
  # Differential learning rates
  backbone_lr: 1.0e-4
  head_lr: 1.0e-3
  scheduler: "cosine"        # cosine | step
  # For step scheduler
  step_size: 10
  gamma: 0.1
  warmup_epochs: 0
  mixed_precision: true
  gradient_clip: null        # null to disable, float to enable

logging:
  use_wandb: true
  use_swanlab: false
  project: "pet-classification"
  log_interval: 10           # log every N batches
